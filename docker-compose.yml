---
networks:
  default:
  dev-proxy:
    external: true

volumes:
  db-data:
  rds-data:
  elastic-data:

services:
  php:
    build:
      context: .
      dockerfile: ./docker/images/php/Dockerfile.loc
      args:
        ENABLE_XDEBUG: ${ENABLE_XDEBUG:-true}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      STAND: loc
      PHP_IDE_CONFIG: serverName=${VIRTUAL_HOST}
      APP_URL: http://${VIRTUAL_HOST}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-tmp}
      DB_NAME: ${DB_NAME:-laravel}
      PG_HOST: ${PG_HOST:-postgre}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASS: ${PG_PASS:-tmp}
      PG_NAME: ${PG_NAME:-laravel}
      ELASTIC_HOST: ${ELS_HOST:-elasticsearch}
      ELASTIC_PORT: ${ELS_PORT:-9200}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    volumes:
      - ./app:/var/www/html
      - ./.git:/var/www/html/.git:ro
    networks:
      - default
      - dev-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dev-proxy"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-php.rule=Host(`${VIRTUAL_HOST}`)"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-php.loadbalancer.server.port=80"
    depends_on:
      - db
      - redis
      - elasticsearch
    restart: unless-stopped

