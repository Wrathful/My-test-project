---
volumes:
  pg-data:

networks:
  default:

services:
  postgres:
    image: postgres:16-alpine
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:-tmp}
      POSTGRES_DB: ${PG_DBNAME:-laravel}
    restart: unless-stopped
