#    restart: unless-stopped

  postgres:
      image: postgres:16-alpine
      security_opt:
          - no-new-privileges:true
      tmpfs:
          - /tmp
          - /var/run/postgresql
      volumes:
          - pg-data:/var/lib/postgresql/data
      environment:
          POSTGRES_PASSWORD: ${PG_PASS:-tmp}
          POSTGRES_DB: ${PG_DBNAME:-my_project}
      restart: unless-stopped

  pgadmin:
      image: dpage/pgadmin4
      depends_on:
          - postgres
      environment:
          PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
          PGADMIN_DEFAULT_PASSWORD: "admin123"
      networks:
          - default
          - dev-proxy
      labels:
          - "traefik.enable=true"
          - "traefik.docker.network=dev-proxy"
          - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-pga.rule=Host(`pga-${VIRTUAL_HOST}`)"
          - "traefik.http.services.${COMPOSE_PROJECT_NAME}-pga.loadbalancer.server.port=80"
      restart: unless-stopped

  db:
    image: mariadb:12.1
    environment:
        MYSQL_ROOT_PASSWORD: ${DB_PASS:-tmp}
        MYSQL_DATABASE: ${DB_NAME:-my_project}
        MARIADB_AUTO_UPGRADE: 1
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/sql:/docker-entrypoint-initdb.d
    restart: unless-stopped


  redis:
    image: redis:7-alpine
    volumes:
      - rds-data:/data
    restart: unless-stopped

  pma:
    image: phpmyadmin/phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: ${DB_HOST:-db}
      PMA_USER: ${DB_USER:-root}
      PMA_PASSWORD: ${DB_PASS:-tmp}
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 1047527424
    expose:
      - 80
    networks:
      - default
      - dev-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dev-proxy"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-pma.rule=Host(`pma-${VIRTUAL_HOST}`)"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-pma.loadbalancer.server.port=80"
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.8.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "ES_HEAP_SIZE=512m"
      - "http.host=0.0.0.0"
      - "transport.host=127.0.0.1"
      - "xpack.security.enabled=false"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

    # ---------- RabbitMQ ----------
  rabbitmq:
      image: rabbitmq:3-management
      hostname: rabbitmq-${VIRTUAL_HOST}   # опционально, имя внутри контейнера
      environment:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: password
      volumes:
          - rabbitmq-data:/var/lib/rabbitmq   # сохраняем данные локально
      networks:
          default:
              aliases:
                  - rabbitmq-${VIRTUAL_HOST}   # чтобы контейнеры в сети видели его по этому имени
          dev-proxy:                       # подключаем к сети Traefik
      labels:
          - "traefik.enable=true"
          - "traefik.docker.network=dev-proxy"
          # Веб-интерфейс (порт 15672)
          - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-rabbitmq.rule=Host(`rabbitmq-${VIRTUAL_HOST}`)"
          - "traefik.http.services.${COMPOSE_PROJECT_NAME}-rabbitmq.loadbalancer.server.port=15672"
      restart: unless-stopped

    # ---------- Kafka (KRaft) ----------
  kafka:
      image: apache/kafka:latest
      hostname: kafka-${VIRTUAL_HOST}    # опционально
      ports:
          - "9092:9092"                     # проброс на хост (опционально, см. пояснение ниже)
      environment:
          # Настройки KRaft (без ZooKeeper)
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          # !!! Важно: рекламируемый адрес, который увидят клиенты
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-${VIRTUAL_HOST}:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_LOG_DIRS: /var/lib/kafka/data
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      volumes:
          - kafka-data:/var/lib/kafka/data   # сохраняем данные
      networks:
          default:
              aliases:
                  - kafka-${VIRTUAL_HOST}   # чтобы контейнеры в сети видели его по этому имени
          dev-proxy:                     # подключаем к сети Traefik (хотя для Kafka HTTP не нужен)
      restart: unless-stopped

  kafdrop:
      image: obsidiandynamics/kafdrop:latest
      environment:
          KAFKA_BROKERCONNECT: kafka-${VIRTUAL_HOST}:9092   # имя брокера из сети
          JVM_OPTS: "-Xms32M -Xmx64M"
          SERVER_SERVLET_CONTEXTPATH: "/"                    # корневой путь
      networks:
          - default
          - dev-proxy
      labels:
          - "traefik.enable=true"
          - "traefik.docker.network=dev-proxy"
          - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-kafdrop.rule=Host(`kafka-${VIRTUAL_HOST}`)"
          - "traefik.http.services.${COMPOSE_PROJECT_NAME}-kafdrop.loadbalancer.server.port=9000"
      depends_on:
          - kafka
      restart: unless-stopped

    # ---------- ClickHouse ----------
  clickhouse:
      image: clickhouse/clickhouse-server:latest
      hostname: clickhouse-${VIRTUAL_HOST}
      environment:
          CLICKHOUSE_DB: ${CLICKHOUSE_DB:-my_project}
          CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
          CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-tmp}
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      volumes:
          - clickhouse-data:/var/lib/clickhouse
      networks:
          default:
              aliases:
                  - clickhouse-${VIRTUAL_HOST}
          dev-proxy:
      restart: unless-stopped
